name: Deploy to Orange Pi

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  test:
    name: Backend tests
    # Run tests on the GitHub-hosted runner (fast, clean environment)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
        working-directory: backend

  deploy:
    name: Build & deploy on Orange Pi
    # Runs directly on the Orange Pi — images are built locally, no registry needed
    runs-on: self-hosted
    needs: test        # only deploy if tests pass

    steps:
      - uses: actions/checkout@v4

      # Restore the .env file from a GitHub secret on every deploy.
      # The _work directory is wiped on each checkout, so the file must be
      # re-created here.
      #
      # Setup (once):
      #   GitHub repo → Settings → Secrets and variables → Actions → New secret
      #   Name:  BACKEND_ENV
      #   Value: full contents of backend/.env  (multi-line is fine)
      #
      # Using printf via env var to correctly handle multi-line secret values.
      - name: Write backend .env
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: printf '%s\n' "$BACKEND_ENV" > backend/.env

      # Docker Compose reads the root .env for variable substitution (e.g.
      # ${POSTGRES_PASSWORD} in docker-compose.prod.yml). The backend/.env is
      # only mounted into the backend container. Write both from the same secret.
      - name: Write root .env for Compose variable substitution
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: printf '%s\n' "$BACKEND_ENV" > .env

      - name: Verify .env exists
        run: |
          if [ ! -s backend/.env ]; then
            echo "ERROR: backend/.env is missing or empty."
            echo "Create a repository secret named BACKEND_ENV with the file contents."
            exit 1
          fi
          echo ".env written ($(wc -l < backend/.env) lines)"

      # Build new images and restart containers.
      # --build       forces a rebuild even if Dockerfiles haven't changed
      # --no-deps     only recreates containers whose image changed
      # --remove-orphans  cleans up containers from removed services
      - name: Build and start containers
        run: |
          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

      # Keep only the 2 most recent versions of each image to save disk space
      - name: Prune old images
        run: docker image prune -f
