# Production docker-compose — used by the GitHub Actions self-hosted runner.
#
# Usage on the Orange Pi (first time):
#   cp backend/.env.example backend/.env && nano backend/.env   # fill in secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Subsequent deploys are handled automatically by GitHub Actions.
#
# Persistent data:
#   noos_pgdata   → PostgreSQL data directory
#   noos_reports  → generated PDF/Word reports

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: noos
      POSTGRES_USER: noos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - noos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noos -d noos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - noos_reports:/data/reports
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://noos:${POSTGRES_PASSWORD}@db:5432/noos
      - REPORTS_DIR=/data/reports
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  noos_pgdata:
  noos_reports:
