version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS — never hard-code credentials here.
#
# Before running for the first time:
#   cp backend/.env.example backend/.env
#   # Edit backend/.env and set every value marked CHANGE_ME
#
# Generate a strong SECRET_KEY with:
#   openssl rand -hex 32
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./reports:/reports
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
